<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <!-- 
  含义详解：
  width=device-width: 宽度等于设备屏幕宽度
  initial-scale=1.0: 初始缩放比例 1:1
  user-scalable=no: 禁止用户双指缩放 (让 App 感觉更像原生应用，而不是网页)
  viewport-fit=cover: 适配全面屏/iPhone 刘海屏，防止内容被遮挡
-->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>lingganshouji</title>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
